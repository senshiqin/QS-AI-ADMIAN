debug: false

spring:
  application:
    name: qs-ai-admian
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qs.ai.admian.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:ReplaceWithAtLeast32BytesSecretKeyForJwtAuth123456}
  access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:7200}

security:
  login:
    failure-limit-enabled: ${LOGIN_FAILURE_LIMIT_ENABLED:true}
    max-failures: ${LOGIN_MAX_FAILURES:5}
    failure-window-seconds: ${LOGIN_FAILURE_WINDOW_SECONDS:300}
    lock-seconds: ${LOGIN_LOCK_SECONDS:900}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
  chat-path: /compatible-mode/v1/chat/completions
  embedding-path: /compatible-mode/v1/embeddings
  embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
  embedding-batch-size: ${DASHSCOPE_EMBEDDING_BATCH_SIZE:10}
  embedding-dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}

milvus:
  uri: ${MILVUS_URI:http://localhost:19530}
  token: ${MILVUS_TOKEN:}
  database-name: ${MILVUS_DATABASE_NAME:default}
  collection-name: ${MILVUS_COLLECTION_NAME:qs_ai_knowledge_chunks}
  dimension: ${MILVUS_DIMENSION:${dashscope.embedding-dimensions}}
  auto-create-collection: ${MILVUS_AUTO_CREATE_COLLECTION:false}
  metric-type: ${MILVUS_METRIC_TYPE:COSINE}
  index-type: ${MILVUS_INDEX_TYPE:IVF_FLAT}
  index-nlist: ${MILVUS_INDEX_NLIST:1024}
  search-nprobe: ${MILVUS_SEARCH_NPROBE:16}
  hnsw-m: ${MILVUS_HNSW_M:16}
  hnsw-ef-construction: ${MILVUS_HNSW_EF_CONSTRUCTION:200}
  hnsw-ef: ${MILVUS_HNSW_EF:64}
  content-max-length: ${MILVUS_CONTENT_MAX_LENGTH:8192}
  similarity-threshold: ${MILVUS_SIMILARITY_THRESHOLD:0.55}
  connect-timeout-ms: ${MILVUS_CONNECT_TIMEOUT_MS:5000}
  rpc-deadline-ms: ${MILVUS_RPC_DEADLINE_MS:60000}

rag:
  default-chunk-size: ${RAG_DEFAULT_CHUNK_SIZE:800}
  default-overlap-ratio: ${RAG_DEFAULT_OVERLAP_RATIO:0.15}
  default-top-k: ${RAG_DEFAULT_TOP_K:5}
  default-min-score: ${RAG_DEFAULT_MIN_SCORE:0.55}
  candidate-multiplier: ${RAG_CANDIDATE_MULTIPLIER:3}
  max-context-chars: ${RAG_MAX_CONTEXT_CHARS:6000}
  min-chunk-chars: ${RAG_MIN_CHUNK_CHARS:20}
  answer-max-tokens: ${RAG_ANSWER_MAX_TOKENS:1200}
  max-input-tokens: ${RAG_MAX_INPUT_TOKENS:6000}
  answer-temperature: ${RAG_ANSWER_TEMPERATURE:0.2}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  chat-path: /chat/completions

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  chat-path: ${OLLAMA_CHAT_PATH:/api/chat}
  model: ${OLLAMA_MODEL:llama3.2:3b}
  connect-timeout-ms: ${OLLAMA_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${OLLAMA_READ_TIMEOUT_MS:120000}
  num-predict: ${OLLAMA_NUM_PREDICT:1024}
  num-ctx: ${OLLAMA_NUM_CTX:4096}
  num-thread: ${OLLAMA_NUM_THREAD:}
  keep-alive: ${OLLAMA_KEEP_ALIVE:10m}

ai:
  rate-limit:
    enabled: ${AI_RATE_LIMIT_ENABLED:true}
    chat-per-minute: ${AI_CHAT_RATE_LIMIT_PER_MINUTE:10}
  models:
    selection:
      default-provider: ${AI_DEFAULT_PROVIDER:qwen}
      fallback-to-default: ${AI_MODEL_FALLBACK_TO_DEFAULT:true}
      model-prefix-routes:
        qwen: qwen
        deepseek: deepseek
        llama: llama3
        llama3: llama3
    refresh:
      auto: ${AI_MODEL_CONFIG_AUTO_REFRESH:false}
      interval-ms: ${AI_MODEL_CONFIG_REFRESH_INTERVAL_MS:60000}
      external-file: ${AI_MODEL_CONFIG_EXTERNAL_FILE:}
    providers:
      qwen:
        enabled: ${QWEN_ENABLED:true}
        provider: QWEN
        display-name: 通义千问
        aliases:
          - dashscope
          - tongyi
          - qwen
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
        chat-path: ${DASHSCOPE_CHAT_PATH:/compatible-mode/v1/chat/completions}
        default-model: ${QWEN_DEFAULT_MODEL:qwen-turbo}
        temperature: ${QWEN_TEMPERATURE:0.7}
        max-tokens: ${QWEN_MAX_TOKENS:1200}
        max-input-tokens: ${QWEN_MAX_INPUT_TOKENS:6000}
        connect-timeout-ms: ${DASHSCOPE_CONNECT_TIMEOUT_MS:5000}
        read-timeout-ms: ${DASHSCOPE_READ_TIMEOUT_MS:60000}
        embedding:
          enabled: ${QWEN_EMBEDDING_ENABLED:true}
          path: ${DASHSCOPE_EMBEDDING_PATH:/compatible-mode/v1/embeddings}
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
          batch-size: ${DASHSCOPE_EMBEDDING_BATCH_SIZE:10}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
      deepseek:
        enabled: ${DEEPSEEK_ENABLED:true}
        provider: DEEPSEEK
        display-name: DeepSeek
        aliases:
          - deepseek
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        chat-path: ${DEEPSEEK_CHAT_PATH:/chat/completions}
        default-model: ${DEEPSEEK_DEFAULT_MODEL:deepseek-chat}
        temperature: ${DEEPSEEK_TEMPERATURE:0.7}
        max-tokens: ${DEEPSEEK_MAX_TOKENS:1200}
        max-input-tokens: ${DEEPSEEK_MAX_INPUT_TOKENS:6000}
        connect-timeout-ms: ${DEEPSEEK_CONNECT_TIMEOUT_MS:5000}
        read-timeout-ms: ${DEEPSEEK_READ_TIMEOUT_MS:60000}
      llama3:
        enabled: ${LLAMA3_ENABLED:true}
        provider: OLLAMA
        display-name: Llama 3 本地模型
        aliases:
          - ollama
          - llama
          - local
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        chat-path: ${OLLAMA_CHAT_PATH:/api/chat}
        default-model: ${OLLAMA_MODEL:llama3.2:3b}
        temperature: ${OLLAMA_TEMPERATURE:0.2}
        max-tokens: ${OLLAMA_MAX_TOKENS:${OLLAMA_NUM_PREDICT:1024}}
        max-input-tokens: ${OLLAMA_MAX_INPUT_TOKENS:${OLLAMA_NUM_CTX:4096}}
        connect-timeout-ms: ${OLLAMA_CONNECT_TIMEOUT_MS:5000}
        read-timeout-ms: ${OLLAMA_READ_TIMEOUT_MS:120000}
        ollama:
          num-predict: ${OLLAMA_NUM_PREDICT:1024}
          num-ctx: ${OLLAMA_NUM_CTX:4096}
          num-thread: ${OLLAMA_NUM_THREAD:}
          keep-alive: ${OLLAMA_KEEP_ALIVE:10m}

file:
  upload:
    base-dir: ${FILE_UPLOAD_BASE_DIR:uploads/files}

maintenance:
  cleanup:
    enabled: ${MAINTENANCE_CLEANUP_ENABLED:true}
    temp-dir: ${MAINTENANCE_TEMP_DIR:uploads/temp}
    expired-hours: ${MAINTENANCE_TEMP_EXPIRED_HOURS:24}
    cron: ${MAINTENANCE_CLEANUP_CRON:0 0 3 * * ?}
  cache-warmup:
    enabled: ${MAINTENANCE_CACHE_WARMUP_ENABLED:true}
    cron: ${MAINTENANCE_CACHE_WARMUP_CRON:0 */10 * * * ?}

logging:
  level:
    org.springframework.boot.autoconfigure: INFO

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        qs.ai.chat.duration: true
        qs.rag.retrieve.duration: true
        qs.rag.ingest.duration: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
        qs.ai.chat.duration: 0.5,0.9,0.95,0.99
        qs.rag.retrieve.duration: 0.5,0.9,0.95,0.99
        qs.rag.ingest.duration: 0.5,0.9,0.95,0.99
