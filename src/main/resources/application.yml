debug: false

spring:
  application:
    name: qs-ai-admian
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qs.ai.admian.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:ReplaceWithAtLeast32BytesSecretKeyForJwtAuth123456}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
  chat-path: /compatible-mode/v1/chat/completions

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  chat-path: /chat/completions

ai:
  rate-limit:
    chat-per-minute: ${AI_CHAT_RATE_LIMIT_PER_MINUTE:10}

logging:
  level:
    org.springframework.boot.autoconfigure: INFO
