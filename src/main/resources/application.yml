debug: false

spring:
  application:
    name: qs-ai-admian
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qs.ai.admian.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:ReplaceWithAtLeast32BytesSecretKeyForJwtAuth123456}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
  chat-path: /compatible-mode/v1/chat/completions
  embedding-path: /compatible-mode/v1/embeddings
  embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
  embedding-batch-size: ${DASHSCOPE_EMBEDDING_BATCH_SIZE:10}
  embedding-dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}

milvus:
  uri: ${MILVUS_URI:http://localhost:19530}
  token: ${MILVUS_TOKEN:}
  database-name: ${MILVUS_DATABASE_NAME:default}
  collection-name: ${MILVUS_COLLECTION_NAME:qs_ai_knowledge_chunks}
  dimension: ${MILVUS_DIMENSION:${dashscope.embedding-dimensions}}
  auto-create-collection: ${MILVUS_AUTO_CREATE_COLLECTION:false}
  metric-type: ${MILVUS_METRIC_TYPE:COSINE}
  index-type: ${MILVUS_INDEX_TYPE:AUTOINDEX}
  content-max-length: ${MILVUS_CONTENT_MAX_LENGTH:8192}
  similarity-threshold: ${MILVUS_SIMILARITY_THRESHOLD:0.55}
  connect-timeout-ms: ${MILVUS_CONNECT_TIMEOUT_MS:5000}
  rpc-deadline-ms: ${MILVUS_RPC_DEADLINE_MS:60000}

rag:
  default-chunk-size: ${RAG_DEFAULT_CHUNK_SIZE:800}
  default-overlap-ratio: ${RAG_DEFAULT_OVERLAP_RATIO:0.15}
  default-top-k: ${RAG_DEFAULT_TOP_K:5}
  default-min-score: ${RAG_DEFAULT_MIN_SCORE:0.55}
  candidate-multiplier: ${RAG_CANDIDATE_MULTIPLIER:3}
  max-context-chars: ${RAG_MAX_CONTEXT_CHARS:6000}
  min-chunk-chars: ${RAG_MIN_CHUNK_CHARS:20}
  answer-max-tokens: ${RAG_ANSWER_MAX_TOKENS:1200}
  max-input-tokens: ${RAG_MAX_INPUT_TOKENS:6000}
  answer-temperature: ${RAG_ANSWER_TEMPERATURE:0.2}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  chat-path: /chat/completions

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  chat-path: ${OLLAMA_CHAT_PATH:/api/chat}
  model: ${OLLAMA_MODEL:llama3.2:3b}
  connect-timeout-ms: ${OLLAMA_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${OLLAMA_READ_TIMEOUT_MS:120000}
  num-predict: ${OLLAMA_NUM_PREDICT:1024}
  num-ctx: ${OLLAMA_NUM_CTX:4096}
  num-thread: ${OLLAMA_NUM_THREAD:}
  keep-alive: ${OLLAMA_KEEP_ALIVE:10m}

ai:
  rate-limit:
    chat-per-minute: ${AI_CHAT_RATE_LIMIT_PER_MINUTE:10}

file:
  upload:
    base-dir: ${FILE_UPLOAD_BASE_DIR:uploads/files}

logging:
  level:
    org.springframework.boot.autoconfigure: INFO
